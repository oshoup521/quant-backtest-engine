name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -fsSL --max-time 60 \
            -A "Mozilla/5.0 (compatible; KeepAlive/1.0)" \
            https://quant-backtest-engine.streamlit.app/ \
            -o /dev/null
